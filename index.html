<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  // ✅ Evita redeclaración
  if (!window.supabaseClient) {
    window.supabaseClient = window.supabase.createClient(
      "https://mxzwicfxfabkelyrpozo.supabase.co",
      "TU_PUBLIC_ANON_KEY_AQUI"
    );
  }

  const supabase = window.supabaseClient;

  let sessionStart = null;
  let currentSessionId = null;
  let vapiInstance = null;

  const assistant = "378de0bf-1fbb-49e0-a326-78416c92a9450-a395090da1cd";
  const apiKey = "0443c03c-942d-4a2a-9450-a395090da1cd";

  const buttonConfig = {
    position: "bottom",
    size: "large",
    label: "Start Speaking"
  };

  // -------------------------
  // SESIÓN
  // -------------------------
  async function startSession() {
    const { data: { user } } = await supabase.auth.getUser();

    if (!user) {
      console.warn("No user logged in");
      return;
    }

    sessionStart = new Date();

    const { data } = await supabase
      .from("sessions")
      .insert([{
        user_id: user.id,
        started_at: sessionStart,
        assistant_version: "v1"
      }])
      .select();

    if (data && data.length > 0) {
      currentSessionId = data[0].id;
    }
  }

  async function endSession() {
    if (!currentSessionId || !sessionStart) return;

    const end = new Date();
    const duration = Math.floor((end - sessionStart) / 1000);

    await supabase
      .from("sessions")
      .update({
        ended_at: end,
        duration_seconds: duration
      })
      .eq("id", currentSessionId);
  }

  // -------------------------
  // LOGIN
  // -------------------------
  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      alert(error.message);
    } else {
      alert("Logged in!");
      loadVapi();
    }
  }

  // -------------------------
  // MANTENER SESIÓN
  // -------------------------
  supabase.auth.getSession().then(({ data }) => {
    if (data.session) {
      loadVapi();
    }
  });

  // -------------------------
  // VAPI
  // -------------------------
  function loadVapi() {
    if (vapiInstance) return;

    const script = document.createElement("script");
    script.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
    script.async = true;

    script.onload = async function () {
      await startSession();

      vapiInstance = window.vapiSDK.run({
        apiKey: apiKey,
        assistant: assistant,
        config: buttonConfig
      });

      vapiInstance.on("call-end", async () => {
        await endSession();
      });
    };

    document.body.appendChild(script);
  }

  // -------------------------
  // BOTÓN LOGIN
  // -------------------------
  document
    .getElementById("loginButton")
    .addEventListener("click", login);

});
</script>
