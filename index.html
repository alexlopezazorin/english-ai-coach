<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI English Coach</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
      background-color: #f4f4f4;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      color: #555;
    }
  </style>
</head>
<body>

  <h1>Welcome to the Speaking class</h1>
  <p>Click the button to start the speaking</p>

  <!-- VAPI SCRIPT -->
  <script>
    var vapiInstance = null;
    const assistant = "378de0bf-1fbb-49e0-a326-78416c92a96f";
    const apiKey = "0443c03c-942d-4a2a-9450-a395090da1cd";
    const buttonConfig = {
      position: "bottom",
      size: "large",
      label: "Start Speaking"
    };

    (function (d, t) {
      var g = document.createElement(t),
        s = d.getElementsByTagName(t)[0];
      g.src =
        "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
      g.defer = true;
      g.async = true;
      s.parentNode.insertBefore(g, s);

      g.onload = function () {
        vapiInstance = window.vapiSDK.run({
          apiKey: apiKey,
          assistant: assistant,
          config: buttonConfig,
        });
      };
    })(document, "script");
  </script>

</body>
</html>
