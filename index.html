<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI English Coach</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background-color: #f4f4f4;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    #logoutButton {
      background-color: #ff4d4d;
      color: white;
      border: none;
      border-radius: 5px;
    }

    #logoutButton:hover {
      background-color: #cc0000;
    }

    #log {
      margin-top: 20px;
      text-align: left;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  </style>
</head>

<body>
  <div id="app">
    <h1>Welcome to the Speaking class</h1>
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button id="loginButton" type="button">Login</button>
    <p>After login, click the button to start speaking</p>
  </div>

  <div id="log"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const supabase = window.supabase.createClient(
        "https://mxzwicfxfabkelyrpozo.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14endpY2Z4ZmFia2VseXJwb3pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMDIwODgsImV4cCI6MjA4Nzc3ODA4OH0.2YFqaJuFg1EgEvOGF10s3oJRGqSIFetSpMieLSly0jE"
      );

      const logDiv = document.getElementById("log");
      function appendLog(message) { logDiv.textContent += message + "\n"; }

      let sessionStart = null;
      let currentSessionId = null;
      let vapiInstance = null;
      let callActive = false;
      let studentLevel = null;
      const assistant = "378de0bf-1fbb-49e0-a326-78416c92a96f";
      const apiKey = "0443c03c-942d-4a2a-9450-a395090da1cd";
      const buttonConfig = { position: "bottom", size: "large", label: "Start Speaking" };

      async function fetchStudentLevel() {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) return null;
        const { data } = await supabase.from("profiles").select("student_level").eq("id", user.id).single();
        if (data) studentLevel = data.student_level;
      }

      async function startSession() {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) return;
        sessionStart = new Date();
        const { data } = await supabase.from("sessions").insert([{ user_id: user.id, started_at: sessionStart, assistant_version: "v1" }]).select();
        if (data && data.length > 0) currentSessionId = data[0].id;
      }

      async function endSession() {
        if (!currentSessionId || !sessionStart) return;
        const end = new Date();
        const duration = Math.floor((end - sessionStart) / 1000);
        await supabase.from("sessions").update({ ended_at: end, duration_seconds: duration }).eq("id", currentSessionId);
        sessionStart = null;
        currentSessionId = null;
      }

      async function showVapiScreen() {
        await fetchStudentLevel();
        const appDiv = document.getElementById("app");
        appDiv.innerHTML = `<h2>Dale al botón para empezar la llamada</h2>
                            <button id="logoutButton">Cerrar sesión</button>`;
        document.getElementById("logoutButton").addEventListener("click", logout);
        loadVapi();
      }

      async function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert(error.message);
        else showVapiScreen();
      }

      async function logout() {
        if (vapiInstance && callActive) {
          try { await vapiInstance.stop(); } catch (e) { console.warn(e); }
          await endSession();
          callActive = false;
        }
        await supabase.auth.signOut();
        location.reload();
      }

      supabase.auth.getSession().then(({ data }) => { if (data.session) showVapiScreen(); });

      function loadVapi() {
        if (vapiInstance) return;
        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
        script.async = true;
        script.onload = function () {
          vapiInstance = window.vapiSDK.run({ apiKey, assistant, config: buttonConfig });

          vapiInstance.on("call-start", async () => {
            callActive = true;
            await startSession();
            if (studentLevel) {
              vapiInstance.send({ type: "add-message", message: { role: "system", content: `The student's level is ${studentLevel}` } });
            }
          });

          vapiInstance.on("call-end", async () => {
            callActive = false;
            await endSession();

            appendLog("Enviando SESSION_JUST_FINISHED...");
            try {
              // Listener temporal para structured-output justo después de enviar la señal
              const structuredListener = (event) => {
                appendLog("Structured output recibido:");
                appendLog(JSON.stringify(event, null, 2));
                vapiInstance.off("structured-output", structuredListener); // solo una vez
              };

              vapiInstance.on("structured-output", structuredListener);

              await vapiInstance.send({ type: "add-message", message: { role: "user", content: "SESSION_JUST_FINISHED" } });
            } catch (e) {
              appendLog("Error enviando SESSION_JUST_FINISHED: " + e.message);
            }
          });
        };
        document.body.appendChild(script);
      }

      document.getElementById("loginButton").addEventListener("click", login);
    });
  </script>
</body>

</html>
