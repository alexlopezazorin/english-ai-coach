<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI English Coach</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
      background-color: #f4f4f4;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    input {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    p {
      font-size: 18px;
      color: #555;
    }
  </style>
</head>

<body>

  <h1>Welcome to the Speaking class</h1>
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button id="loginButton" type="button">Login</button>

  <p>After login, click the button to start speaking</p>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {

      // =============================
      // 1️⃣ Conectar con Supabase
      // =============================

      const supabase = window.supabase.createClient(
        "https://mxzwicfxfabkelyrpozo.supabase.co",
        "PEGA_AQUI_LA_ANON_PUBLIC_KEY_REAL"
      );

      let sessionStart = null;
      let currentSessionId = null;
      let vapiInstance = null;

      const assistant = "378de0bf-1fbb-49e0-a326-78416c92a9450-a395090da1cd";
      const apiKey = "0443c03c-942d-4a2a-9450-a395090da1cd";

      const buttonConfig = {
        position: "bottom",
        size: "large",
        label: "Start Speaking"
      };

      // =============================
      // 2️⃣ Crear sesión en DB
      // =============================

      async function startSession() {
        const { data: { user } } = await supabase.auth.getUser();

        if (!user) return;

        sessionStart = new Date();

        const { data } = await supabase
          .from("sessions")
          .insert([{
            user_id: user.id,
            started_at: sessionStart,
            assistant_version: "v1"
          }])
          .select();

        if (data && data.length > 0) {
          currentSessionId = data[0].id;
        }
      }

      async function endSession() {
        if (!currentSessionId || !sessionStart) return;

        const end = new Date();
        const duration = Math.floor((end - sessionStart) / 1000);

        console.log("Ending session...", { currentSessionId, duration });  // <-- Verificación

        const { data, error } = await supabase
          .from("sessions")
          .update({
            ended_at: end,
            duration_seconds: duration
          })
          .eq("id", currentSessionId);

        console.log("Session ended data:", data, "error:", error);
      }

      // =============================
      // 3️⃣ Login
      // =============================

      async function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        const { error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          alert(error.message);
        } else {
          alert("Logged in!");
          loadVapi();
        }
      }

      // =============================
      // 4️⃣ Mantener sesión activa
      // =============================

      supabase.auth.getSession().then(({ data }) => {
        if (data.session) {
          loadVapi();
        }
      });

      // =============================
      // 5️⃣ Cargar Vapi
      // =============================

      function loadVapi() {
        console.log("Loading Vapi...");  // <-- Verificación

        if (vapiInstance) return;

        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
        script.async = true;

        script.onload = function () {
          console.log("Vapi script loaded successfully");

          // Inicialización de Vapi después de cargar el script
          vapiInstance = window.vapiSDK.run({
            apiKey: apiKey,
            assistant: assistant,
            config: buttonConfig,
          });

          console.log("Vapi instance initialized", vapiInstance);  // <-- Verificación

          vapiInstance.on("call-end", async () => {
            console.log("Call ended, saving session...");
            await endSession();
          });
        };

        document.body.appendChild(script);
      }

      // =============================
      // 6️⃣ Conectar botón
      // =============================

      const loginBtn = document.getElementById("loginButton");

      if (loginBtn) {
        loginBtn.addEventListener("click", login);
      } else {
        console.error("No se encontró el botón con id='loginButton'");
      }

    });
  </script>

</body>
</html>
