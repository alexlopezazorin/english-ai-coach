<!DOCTYPE html>
<html>
<head>
  <title>Teacher Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h1>Teacher Dashboard</h1>

<div id="loading">Comprobando acceso...</div>

<div id="not-authorized" style="display:none;">
  <h2>No autorizado</h2>
</div>

<div id="teacher-content" style="display:none;">
  <h2>Acceso concedido</h2>
  <p>Bienvenido al panel del profesor.</p>
  
  <button onclick="loadRawData()">Cargar datos crudos</button>
  <pre id="output"></pre>
  
  <button onclick="logout()">Cerrar sesión</button>
</div>

<script>

const supabaseClient = window.supabase.createClient(
  "https://mxzwicfxfabkelyrpozo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14endpY2Z4ZmFia2VseXJwb3pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMDIwODgsImV4cCI6MjA4Nzc3ODA4OH0.2YFqaJuFg1EgEvOGF10s3oJRGqSIFetSpMieLSly0jE"
)

async function checkAccess() {

  const { data: { user } } = await supabaseClient.auth.getUser()

  if (!user) {
    window.location.href = "/index.html"
    return
  }

  const { data: profile, error } = await supabaseClient
    .from('profiles')
    .select('role')
    .eq('id', user.id)
    .single()

  document.getElementById("loading").style.display = "none"

  if (error || !profile || profile.role !== 'teacher') {
    document.getElementById("not-authorized").style.display = "block"
  } else {
    document.getElementById("teacher-content").style.display = "block"
  }
}


async function loadRawData() {

  const { data: { user } } = await supabaseClient.auth.getUser()

  if (!user) {
    alert("No authenticated user")
    return
  }

  const { data: { session }, error } = await supabaseClient.auth.getSession()

  if (!session) {
    alert("No active session")
    return
  }

  const response = await fetch(
    "https://mxzwicfxfabkelyrpozo.supabase.co/functions/v1/get-raw-data",
    {
      method: "GET",
      headers: {
        "Authorization": `Bearer ${session.access_token}`,
        "Content-Type": "application/json"
      }
    }
  )

  const result = await response.json()

  document.getElementById("output").textContent =
    JSON.stringify(result, null, 2)
}


async function logout() {
  await supabaseClient.auth.signOut()
  window.location.href = "/index.html"
}

checkAccess()

</script>

</body>
</html>
