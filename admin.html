<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Panel del Profesor</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Panel del Profesor</h1>

  <div id="not-authorized" style="display:none;">
    <h2>No autorizado</h2>
  </div>

  <div id="admin-content" style="display:none;">
    
    <h2>Crear nuevo alumno</h2>
    <input type="text" id="newName" placeholder="Nombre completo"><br><br>
    <input type="email" id="newEmail" placeholder="Email"><br><br>
    <input type="password" id="newPassword" placeholder="Password"><br><br>
    <button onclick="createUser()">Crear usuario</button>

    <hr>

    <h2>Lista de usuarios</h2>
    <div id="userList"></div>

    <br>
    <button onclick="logout()">Cerrar sesión</button>
  </div>

<script>
  const supabaseClient = window.supabase.createClient(
    "https://mxzwicfxfabkelyrpozo.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14endpY2Z4ZmFia2VseXJwb3pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMDIwODgsImV4cCI6MjA4Nzc3ODA4OH0.2YFqaJuFg1EgEvOGF10s3oJRGqSIFetSpMieLSly0jE"
  )

  async function checkAccess() {
    const { data: { user } } = await supabaseClient.auth.getUser()

    if (!user) {
      window.location.href = "/index.html"
      return
    }

    const { data: profile, error } = await supabaseClient
      .from('profiles')
      .select('role')
      .eq('id', user.id)
      .single()

    if (error || !profile || profile.role !== 'teacher') {
      document.getElementById("not-authorized").style.display = "block"
    } else {
      document.getElementById("admin-content").style.display = "block"
      loadUsers()
    }
  }

  async function loadUsers() {
    const { data, error } = await supabaseClient
      .from('profiles')
      .select('email, full_name, role')

    if (error) {
      console.error(error)
      return
    }

    const list = document.getElementById("userList")
    list.innerHTML = ""

    data.forEach(u => {
      list.innerHTML += `<p>${u.full_name || "Sin nombre"} - ${u.email} (${u.role})</p>`
    })
  }

  async function createUser() {
    const full_name = document.getElementById("newName").value
    const email = document.getElementById("newEmail").value
    const password = document.getElementById("newPassword").value

    if (!full_name || !email || !password) {
      alert("Completa todos los campos")
      return
    }

    const { data: { session } } = await supabaseClient.auth.getSession()

    if (!session) {
      alert("Sesión no válida")
      return
    }

    const response = await fetch(
      "https://mxzwicfxfabkelyrpozo.supabase.co/functions/v1/create-user",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${session.access_token}`
        },
        body: JSON.stringify({ full_name, email, password })
      }
    )

    const result = await response.json()

    if (!response.ok) {
      alert("Error: " + (result.error || "No se pudo crear el usuario"))
      return
    }

    alert("Usuario creado correctamente")

    document.getElementById("newName").value = ""
    document.getElementById("newEmail").value = ""
    document.getElementById("newPassword").value = ""

    loadUsers()
  }

  async function logout() {
    await supabaseClient.auth.signOut()
    window.location.href = "/index.html"
  }

  checkAccess()
</script>
</body>
</html>
