<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Panel del Profesor</h1>

  <div id="not-authorized" style="display:none;">
    <h2>No autorizado</h2>
  </div>

  <div id="admin-content" style="display:none;">
    
    <h2>Crear nuevo alumno</h2>
    <input type="text" id="newName" placeholder="Nombre completo"><br><br>
    <input type="email" id="newEmail" placeholder="Email"><br><br>
    <input type="password" id="newPassword" placeholder="Password"><br><br>
    <button onclick="createUser()">Crear usuario</button>

    <hr>

    <h2>Lista de usuarios</h2>
    <div id="userList"></div>

    <br>
    <button onclick="logout()">Cerrar sesión</button>
  </div>

<script>
const supabase = window.supabase.createClient(
  "https://mxzwicfxfabkelyrpozo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14endpY2Z4ZmFia2VseXJwb3pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMDIwODgsImV4cCI6MjA4Nzc3ODA4OH0.2YFqaJuFg1EgEvOGF10s3oJRGqSIFetSpMieLSly0jE"
)

async function checkAccess() {
  const { data: { user } } = await supabase.auth.getUser()

  if (!user) {
    window.location.href = "/index.html"
    return
  }

  const { data: profile } = await supabase
    .from('profiles')
    .select('role')
    .eq('id', user.id)
    .single()

  if (!profile || profile.role !== 'teacher') {
    document.getElementById("not-authorized").style.display = "block"
  } else {
    document.getElementById("admin-content").style.display = "block"
    loadUsers()
  }
}

async function loadUsers() {
  const { data } = await supabase
    .from('profiles')
    .select('email, full_name, role')

  const list = document.getElementById("userList")
  list.innerHTML = ""

  data.forEach(u => {
    list.innerHTML += `<p>${u.full_name || "Sin nombre"} - ${u.email} (${u.role})</p>`
  })
}

async function createUser() {
  alert("Para crear usuarios debes usar la Service Role Key desde backend. No se puede hacer desde frontend por seguridad.")
}

async function logout() {
  await supabase.auth.signOut()
  window.location.href = "/index.html"
}

checkAccess()
</script>
</body>
</html>
