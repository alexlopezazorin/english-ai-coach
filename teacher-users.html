<!DOCTYPE html>
<html>
<head>
  <title>Teacher - User Management</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h1>Teacher - User Management</h1>

<div id="loading">Comprobando acceso...</div>

<div id="teacher-content" style="display:none;">

  <h2>Usuarios existentes</h2>
  <pre id="users_output"></pre>

  <h3>Crear nuevo usuario</h3>
  <input type="email" id="new_email" placeholder="Email" />
  <input type="password" id="new_password" placeholder="Password" />
  <input type="text" id="new_full_name" placeholder="Full Name" />
  <select id="new_student_level">
    <option value="">Selecciona nivel</option>
    <option value="A1">A1</option>
    <option value="A2">A2</option>
    <option value="B1">B1</option>
    <option value="B2">B2</option>
    <option value="C1">C1</option>
    <option value="C2">C2</option>
  </select>
  <button onclick="createUser()">Crear usuario</button>

  <br /><br />
  <button onclick="logout()">Cerrar sesión</button>

</div>

<script>

const supabaseClient = window.supabase.createClient(
  "https://mxzwicfxfabkelyrpozo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14endpY2Z4ZmFia2VseXJwb3pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMDIwODgsImV4cCI6MjA4Nzc3ODA4OH0.2YFqaJuFg1EgEvOGF10s3oJRGqSIFetSpMieLSly0jE"
);

// =====================
// Verificar acceso
// =====================
async function checkAccess() {

  const { data: { user } } = await supabaseClient.auth.getUser();

  if (!user) {
    window.location.href = "/index.html";
    return;
  }

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("role")
    .eq("id", user.id)
    .single();

  if (!profile || profile.role !== "teacher") {
    window.location.href = "/index.html";
    return;
  }

  document.getElementById("loading").style.display = "none";
  document.getElementById("teacher-content").style.display = "block";

  loadUsers();
}

// =====================
// Cargar usuarios
// =====================
async function loadUsers() {

  const { data: users, error } = await supabaseClient
    .from("profiles")
    .select("*");

  if (error) {
    document.getElementById("users_output").textContent =
      "Error al cargar usuarios: " + error.message;
    return;
  }

  document.getElementById("users_output").textContent =
    JSON.stringify(users, null, 2);
}

// =====================
// Crear usuario
// =====================
async function createUser() {

  const email = document.getElementById("new_email").value.trim();
  const password = document.getElementById("new_password").value.trim();
  const full_name = document.getElementById("new_full_name").value.trim();
  const student_level = document.getElementById("new_student_level").value;

  if (!email || !password || !full_name) {
    alert("Email, Full Name y Password son obligatorios.");
    return;
  }

  if (password.length < 6) {
    alert("La contraseña debe tener al menos 6 caracteres.");
    return;
  }

  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (!emailRegex.test(email)) {
    alert("Email inválido.");
    return;
  }

  const validLevels = ["A1","A2","B1","B2","C1","C2"];

  if (!validLevels.includes(student_level)) {
    alert("Selecciona un nivel válido.");
    return;
  }

  const { data: { session } } = await supabaseClient.auth.getSession();

  if (!session) {
    alert("No hay sesión activa");
    return;
  }

  const response = await fetch(
    "https://mxzwicfxfabkelyrpozo.supabase.co/functions/v1/create-user",
    {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${session.access_token}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        password,
        full_name,
        student_level
      })
    }
  );

  const result = await response.json();

  if (result.error) {
    alert("Error: " + result.error);
  } else {
    alert("Usuario creado correctamente");
    loadUsers();
  }
}

// =====================
// Logout
// =====================
async function logout() {

  await supabaseClient.auth.signOut();
  window.location.href = "/index.html";

}

checkAccess();

</script>

</body>
</html>
