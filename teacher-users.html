<!DOCTYPE html>
<html>
<head>
  <title>Teacher - User Management</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h1>Teacher - User Management</h1>

<div id="loading">Comprobando acceso...</div>

<div id="teacher-content" style="display:none;">

  <h2>Usuarios existentes</h2>
  <pre id="users_output"></pre>

  <h3>Crear nuevo usuario</h3>
  <input type="email" id="new_email" placeholder="Email" />
  <input type="password" id="new_password" placeholder="Password" />
  <input type="text" id="new_full_name" placeholder="Full Name" />
  <select id="new_student_level">
    <option value="">Selecciona nivel</option>
    <option value="A1">A1</option>
    <option value="A2">A2</option>
    <option value="B1">B1</option>
    <option value="B2">B2</option>
    <option value="C1">C1</option>
    <option value="C2">C2</option>
  </select>
  <button onclick="createUser()">Crear usuario</button>

  <h3>Eliminar usuario</h3>
  <select id="delete_email"></select>
  <button onclick="deleteUser()">Eliminar usuario</button>

  <br /><br />
  <button onclick="logout()">Cerrar sesión</button>

</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://mxzwicfxfabkelyrpozo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14endpY2Z4ZmFia2VseXJwb3pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMDIwODgsImV4cCI6MjA4Nzc3ODA4OH0.2YFqaJuFg1EgEvOGF10s3oJRGqSIFetSpMieLSly0jE"
);

async function checkAccess() {
  const { data: { user } } = await supabaseClient.auth.getUser();
  if (!user) {
    window.location.href = "/index.html";
    return;
  }

  const { data: profile } = await supabaseClient
    .from('profiles')
    .select('role')
    .eq('id', user.id)
    .single();

  if (!profile || profile.role !== 'teacher') {
    window.location.href = "/index.html";
    return;
  }

  document.getElementById("loading").style.display = "none";
  document.getElementById("teacher-content").style.display = "block";

  loadUsers();
}

// =====================
// Cargar lista de usuarios
// =====================
async function loadUsers() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) return;

  const response = await fetch(
    "https://mxzwicfxfabkelyrpozo.supabase.co/functions/v1/get-users",
    {
      method: "GET",
      headers: { "Authorization": `Bearer ${session.access_token}` }
    }
  );

  const users = await response.json();

  // Mostrar lista JSON completa
  document.getElementById("users_output").textContent = JSON.stringify(users, null, 2);

  // Rellenar dropdown de eliminación
  const deleteSelect = document.getElementById("delete_email");
  deleteSelect.innerHTML = "";
  users.forEach(u => {
    const option = document.createElement("option");
    option.value = u.email;
    option.textContent = u.email;
    deleteSelect.appendChild(option);
  });
}

// =====================
// Crear nuevo usuario
// =====================
async function createUser() {
  const email = document.getElementById("new_email").value.trim();
  const password = document.getElementById("new_password").value.trim();
  const full_name = document.getElementById("new_full_name").value.trim();
  const student_level = document.getElementById("new_student_level").value;

  // Validación
  if (!email || !full_name || !password) {
    return alert("Email, Full Name y Password son obligatorios.");
  }
  if (password.length < 6) {
    return alert("La contraseña debe tener al menos 6 caracteres.");
  }
  // Validación básica email
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
    return alert("Email inválido.");
  }

  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) return alert("No hay sesión activa");

  const response = await fetch(
    "https://mxzwicfxfabkelyrpozo.supabase.co/functions/v1/create-user",
    {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${session.access_token}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password, full_name, student_level })
    }
  );

  const result = await response.json();
  if (result.error) {
    alert("Error: " + result.error);
  } else {
    alert("Usuario creado correctamente");
    loadUsers();
  }
}

// =====================
// Eliminar usuario
// =====================
async function deleteUser() {
  const email = document.getElementById("delete_email").value;
  if (!email) return alert("Selecciona un usuario para eliminar");
  if (!confirm(`¿Seguro que quieres eliminar al usuario ${email}?`)) return;

  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) return alert("No hay sesión activa");

  const response = await fetch(
    "https://mxzwicfxfabkelyrpozo.supabase.co/functions/v1/delete-user",
    {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${session.access_token}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email })
    }
  );

  const result = await response.json();
  if (result.error) {
    alert("Error al eliminar usuario: " + result.error);
  } else {
    alert(`Usuario ${email} eliminado correctamente`);
    loadUsers();
  }
}

// =====================
// Cerrar sesión
// =====================
async function logout() {
  await supabaseClient.auth.signOut();
  window.location.href = "/index.html";
}

checkAccess();
</script>
</body>
</html>
