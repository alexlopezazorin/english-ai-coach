<!DOCTYPE html>
<html>
<head>
  <title>User Management</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>User Management</h1>

<div id="loading">Checking access...</div>

<div id="content" style="display:none;">

<h2>Create User</h2>

<input id="email" placeholder="Email">
<input id="password" placeholder="Password">
<input id="full_name" placeholder="Full name">

<select id="student_level">
<option value="A1">A1</option>
<option value="A2">A2</option>
<option value="B1">B1</option>
<option value="B2">B2</option>
<option value="C1">C1</option>
<option value="C2">C2</option>
</select>

<button onclick="createUser()">Create User</button>

<hr>

<h2>Existing Users</h2>

<button onclick="loadUsers()">Refresh list</button>

<pre id="users"></pre>

<hr>

<button onclick="logout()">Logout</button>

</div>

<script>

const supabase = window.supabase.createClient(
  "https://mxzwicfxfabkelyrpozo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14endpY2Z4ZmFia2VseXJwb3pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMDIwODgsImV4cCI6MjA4Nzc3ODA4OH0.2YFqaJuFg1EgEvOGF10s3oJRGqSIFetSpMieLSly0jE"
)

async function checkAccess(){

  const { data:{ user } } = await supabase.auth.getUser()

  if(!user){
    window.location.href="/index.html"
    return
  }

  const { data:profile } = await supabase
  .from("profiles")
  .select("role")
  .eq("id",user.id)
  .single()

  if(!profile || profile.role !== "teacher"){
    window.location.href="/index.html"
    return
  }

  document.getElementById("loading").style.display="none"
  document.getElementById("content").style.display="block"

  loadUsers()
}

async function loadUsers(){

  const { data } = await supabase
  .from("profiles")
  .select("*")

  document.getElementById("users").textContent =
  JSON.stringify(data,null,2)
}

async function createUser(){

  const email=document.getElementById("email").value
  const password=document.getElementById("password").value
  const full_name=document.getElementById("full_name").value
  const student_level=document.getElementById("student_level").value

  const { data:{ session } } = await supabase.auth.getSession()

  const response = await fetch(
  "https://mxzwicfxfabkelyrpozo.supabase.co/functions/v1/create-user",
  {
    method:"POST",
    headers:{
      "Authorization":`Bearer ${session.access_token}`,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      email,
      password,
      full_name,
      student_level
    })
  })

  const result = await response.json()

  alert(JSON.stringify(result))

  loadUsers()
}

async function logout(){

  await supabase.auth.signOut()

  window.location.href="/index.html"
}

checkAccess()

</script>

</body>
</html>
